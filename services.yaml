    - Speedtest:
        icon: speedtest-tracker.png
        href: http://speed.volo.nas
        server: emporer-docker
        container: ix-speedtest-tracker-speedtest-tracker-1
        description: Network speed tracker
        widget:
            type: speedtest
            url: http://speed.volo.nas
            bitratePrecision: 0
            fields: ["download", "upload", "ping"]
            highlight:
                download:
                    numeric:
                        - level: danger
                          when: lte
                          value: 250
                        - level: warn
                          when: lte
                          value: 450
                        - level: good
                          when: gte
                          value: 450
                upload:
                    numeric:
                        - level: danger
                          when: lte
                          value: 25
                        - level: warn
                          when: lte
                          value: 45
                        - level: good
                          when: gte
                          value: 45
                ping:
                    numeric:
                        - level: danger
                          when: gte
                          value: 50
                        - level: warn
                          when: gte
                          value: 20
                        - level: good
                          when: lt
                          value: 20
