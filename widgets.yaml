---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/info-widgets/

- resources:
    cpu: true
    memory: true
    network: true

- unifi_console:
    url: https://192.168.3.21
    key: {{HOMEPAGE_FILE_UNIFI_KEY}}

- search:
    provider: duckduckgo
    target: _blank

- datetime:
    text_size: xl
    format:
        dateStyle: long
        timeStyle: short
        hourCycle: h23