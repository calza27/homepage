    - Uptime:
        icon: uptime-kuma.png
        href: http://kuma.volo.nas
        container: ix-uptime-kuma-uptime-kuma-1
        server: volo-docker
        description: Monitor the status of your services
        widgets:
            - type: uptimekuma
              url: http://kuma.volo.nas
              slug: media-stack
              fields: ["up", "down", "uptime"]
              highlight:
                up:
                    numeric:
                        - level: danger
                          when: eq
                          value: 0
                down:
                    numeric:
                        - level: warn
                          when: gte
                          value: 1
                        - level: good
                          when: eq
                          value: 0
                uptime:
                    numeric:
                        - level: danger
                          when: lt
                          value: 80
                        - level: warn
                          when: lt
                          value: 98
                        - level: good
                          when: gte
                          value: 98
            - type: uptimekuma
              url: http://kuma.volo.nas
              slug: support-svcs
              fields: ["up", "down", "uptime"]
              highlight:
                up:
                    numeric:
                        - level: danger
                          when: eq
                          value: 0
                down:
                    numeric:
                        - level: warn
                          when: gte
                          value: 1
                        - level: good
                          when: eq
                          value: 0
                uptime:
                    numeric:
                        - level: danger
                          when: lt
                          value: 80
                        - level: warn
                          when: lt
                          value: 98
                        - level: good
                          when: gte
                          value: 98
########################################################################################################################################################################################################
- MEDIA:
    - Now Playing:
        - Jellyfin:
            icon: jellyfin.png
            href: http://jellyfin.volo.nas
            container: ix-jellyfin-jellyfin-1
            server: volo-docker
            description: Multimedia streaming library
            widget:
                type: jellyfin
                url: http://jellyfin.volo.nas
                key: {{HOMEPAGE_FILE_JELLYFIN_KEY}}
                enableBlocks: true 
                enableNowPlaying: true
                enableUser: true
                showEpisodeNumber: true 
                expandOneStreamToTwoRows: false
                fields: ["movies", "series"]
    - Downloading:
        - qBitTorrent:
            icon: qbittorrent.png
            href: http://qbit.volo.nas
            container: qbittorrent
            server: volo-docker
            description: Torrent client
            widget:
                type: qbittorrent
                url: http://qbit.volo.nas
                username: admin
                password: {{HOMEPAGE_FILE_QBIT_KEY}}
                enableLeechProgress: true
                enableLeechSize: true
########################################################################################################################################################################################################
- Media Stack:
    - Stack:
        - JellySeerr:
            icon: seerr.png
            href: http://seer.volo.nas
            container: ix-jelly-seerr-seerr-1
            server: volo-docker
            description: Request management for Jellyfin
            widgets:
                - type: seerr
                  url: http://seer.volo.nas
                  key: {{HOMEPAGE_FILE_SEER_KEY}}
                  fields: ["pending", "approved", "available"]
                - type: seerr
                  url: http://seer.volo.nas
                  key: {{HOMEPAGE_FILE_SEER_KEY}}
                  fields: ["completed", "processing", "issues"]
        - Cleanuparr:
            icon: cleanuparr.png
            href: http://cleanuparr.volo.nas
            container: ix-cleanuparr-cleanuparr-1
            server: volo-docker
            description: Download cleanup and management
            widgets:
                - type: customapi
                  url: http://cleanuparr.volo.nas/api/stats?hours=24
                  refreshInterval: 10000
                  method: GET
                  headers:
                    X-Api-Key: {{HOMEPAGE_FILE_CLEANUPARR_KEY}}
                  mappings:
                    - field: events.byType.FailedImportStrike
                      label: Fail Import Strikes
                      format: number
                      remap:
                        - value: null
                          to: 0
                    - field: events.byType.StalledStrike
                      label: Stall Strikes
                      format: number
                      remap:
                        - value: null
                          to: 0
                    - field: events.byType.DownloadingMetadataStrike
                      label: Metadata Strikes
                      format: number
                      remap:
                        - value: null
                          to: 0
                - type: customapi
                  url: http://cleanuparr.volo.nas/api/stats?hours=24
                  refreshInterval: 10000
                  method: GET
                  headers:
                    X-Api-Key: {{HOMEPAGE_FILE_CLEANUPARR_KEY}}
                  mappings:
                    - field: events.byType.QueueItemDeleted
                      label: Queue Item Deleted
                      format: number
                      remap:
                        - value: null
                          to: 0
                    - field: events.byType.DownloadCleaned
                      label: Download Cleaned
                      format: number
                      remap:
                        - value: null
                          to: 0
        - Sonarr:
            icon: sonarr.png
            href: http://sonarr.volo.nas
            container: ix-sonarr-sonarr-1
            server: volo-docker
            description: Automate downloading series
            widget:
                type: sonarr
                url: http://sonarr.volo.nas
                key: {{HOMEPAGE_FILE_SONARR_KEY}}
                fields: ["wanted", "queued", "series"]
        - Radarr:
            icon: radarr.png
            href: http://radarr.volo.nas
            container: ix-radarr-radarr-1
            server: volo-docker
            description: Automate downloading movies
            widget:
                type: radarr
                url: http://radarr.volo.nas
                key: {{HOMEPAGE_FILE_RADARR_KEY}}
                fields: ["wanted", "queued", "movies"]
        - Bookshelf:
            icon: readarr.png
            href: http://bookshelf.volo.nas
            container: ix-bookshelf-bookshelf-1
            server: volo-docker
            description: Automate downloading books
            widget:
                type: readarr
                url: http://bookshelf.volo.nas
                key: {{HOMEPAGE_FILE_BOOKSHELF_KEY}}
                fields: ["wanted", "queued", "books"]
        - Bazarr:
            icon: bazarr.png
            href: http://bazarr.volo.nas
            container: ix-bazarr-bazarr-1
            server: volo-docker
            description: Media subtitles management
            widget:
                type: bazarr
                url: http://bazarr.volo.nas
                key: {{HOMEPAGE_FILE_BAZARR_KEY}}
                fields: ["missingEpisodes", "missingMovies"]
        - Prowlarr:
            icon: prowlarr.png
            href: http://prowlarr.volo.nas
            container: ix-prowlarr-prowlarr-1
            server: volo-docker
            description: Indexer manager for Usenet and torrents
            widget:
                type: prowlarr
                url: http://prowlarr.volo.nas
                key: {{HOMEPAGE_FILE_PROWLARR_KEY}}
                fields: ["numberOfGrabs", "numberOfQueries", "numberOfFailGrabs", "numberOfFailQueries"]
    - Release Calendar:
        - " ":
            href: https://jellyfin.volo.nas
            widget:
                type: calendar
                firstDayInWeek: monday
                view: monthly
                maxEvents: 20
                showTime: true
                timezone: Australia/Melbourne
                integrations:
                    - type: sonarr
                      service_group: Stack
                      service_name: Sonarr
                      color: green
                      params:
                        unmonitored: false
                    - type: radarr
                      service_group: Stack
                      service_name: Radarr
                      color: blue
                      params:
                        unmonitored: false
