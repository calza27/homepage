---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/settings/
title: pullyblank/Homepage
language: en
theme: dark
color: stone
target: _self
headerStyle: boxed
statusStyle: "dot"
hideVersion: false
cardBlur: sm
background: 
  image: https://images.unsplash.com/photo-1637825891028-564f672aa42c
  blur: xl
  brightness: 90
  opacity: 60

providers:
  openweathermap: openweathermapapikey
  weatherapi: weatherapiapikey

layout:
  # Emporer.net Items
  Network System:
    tab: Emporer.net
    icon: mdi-desktop-classic-#FFFFFF
    style: row
    columns: 4
  Network:
    tab: Emporer.net
    icon: mdi-network-#FFFFFF
    style: row
    columns: 2
  # Volo.nas Items
  Media System:
    tab: Volo.nas
    System:
      style: row
      icon: mdi-desktop-classic-#FFFFFF
      columns: 4
    CPU:
      icon: mdi-cpu-64-bit-#FFFFFF
      style: row
      columns: 4
    Disk Activity:
      icon: mdi-harddisk-#FFFFFF
      style: row
      columns: 4
    System Apps:
      icon: mdi-application-#FFFFFF
      style: row
      columns: 4
  MEDIA:
    tab: Volo.nas
    style: row
    columns: 2
    Now Playing:
      icon: mdi-video-account-#FFFFFF
    Release Calendar:
      icon: mdi-calendar-account-outline-#FFFFFF
      style: row
      columns: 1
  Stack:
    style: row
    icon: mdi-server-#FFFFFF
    columns: 4
