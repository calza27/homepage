- Network:
    # - Primary PiHole:
    #     icon: pi-hole.png
    #     href: http://pihole.emporer.net
    #     container: pihole
    #     server: emporer-docker
    #     description: Primary network-wide ad blocker (emporer.net)
    #     widgets:
    #         - type: pihole
    #           url: http://pihole.emporer.net
    #           version: 6
    #           highlight:
    #             queries:
    #                 string:
    #                     - level: danger
    #                       when: equals
    #                       value: "0"
    #             blocked:
    #                 string:
    #                     - level: danger
    #                       when: regex
    #                       value: "\\(0%\\)"
    #             gravity:
    #                 string:
    #                     - level: danger
    #                       when: equals
    #                       value: "0"
    - Secondary PiHole:
        icon: pi-hole.png
        href: http://pihole.volo.nas/admin
        container: ix-pihole-pihole-1
        server: volo-docker
        description: Secondary network-wide ad blocker (volo.nas)
        widgets:
            - type: pihole
              url: http://pihole.volo.nas
              version: 6
              highlight:
                queries:
                    string:
                        - level: danger
                          when: equals
                          value: "0"
                blocked:
                    string:
                        - level: danger
                          when: regex
                          value: "\\(0%\\)"
                gravity:
                    string:
                        - level: danger
                          when: equals
                          value: "0"
    - nGinx:
        icon: nginx.png
        href: http://nginx.volo.nas
        container: ix-nginx-proxy-manager-npm-1
        server: emporer-docker
        description: Web server and reverse proxy
        widget:
            type: npm
            url: http://nginx.volo.nas
            username: calza27@gmail.com
            password: {{HOMEPAGE_FILE_NGINX_KEY}}
    - unifi:
        icon: unifi.png
        href: https://192.168.3.21
        description: Network management controller
        widget:
            type: unifi
            url: https://192.168.3.21
            key: {{HOMEPAGE_FILE_UNIFI_KEY}}
            highlight:
                wlan:
                    string:
                        - level: danger
                          when: equals
                          negate: true
                          value: "UP"
                        - level: good
                          when: equals
                          value: "UP"
                wlan_devices:
                    numeric:
                        - level: danger
                          when: equals
                          value: 0
                        - level: good
                          when: gt
                          value: 0
                wlan_users:
                    numeric:
                        - level: warn
                          when: equals
                          value: 0
                        - level: good
                          when: gt
                          value: 0
